<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petani Indonesia</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo-wrap">
            <img src="logo.png" alt="">
            <span>Petani Indonesia</span>
        </div>
        <div class="header-actions">
            <div class="top-menu">
                <a href="#">Product</a>
                <a href="#">Galleries</a>
                <a href="#">Contact Us</a>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search">
                <button>Search</button>
            </div>
        </div>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About US</a>
    </nav>

    <div class="main-wrapper">
        <div class="col-left">
            <button class="btn-menu">Feature 1</button>
            <button class="btn-menu">Feature 2</button>
            <button class="btn-menu">Feature 3</button>
            <button class="btn-menu">Feature 4</button>
            <button class="btn-menu">Feature 5</button>
            
            <img class="img-small" src="image2.jpg" alt="">

            <div class="email-container">
                <label for="email">Email address</label>
                <input type="email" id="email">
            </div>
        </div>

        <div class="col-center">
            <img src="image1.jpg" alt="">
        </div>

        <div class="col-right">
            <button class="btn-menu">Session 1</button>
            <button class="btn-menu">Session 2</button>
            <button class="btn-menu">Session 3</button>
            <button class="btn-menu">Session 4</button>
            <button class="btn-menu">Session 5</button>
            <button class="btn-menu">Session 6</button>
            <button class="btn-menu">Session 7</button>
            <button class="btn-menu">Session 8</button>
            <button class="btn-menu">Session 9</button>
            <button class="btn-menu">Session 10</button>
        </div>
    </div>

    <footer>
        &copy; 2026 Petani Indonesia | Developed with <span class="heart">❤️</span> by <a href="#" class="dev-link">Mister Goyo</a>
    </footer>

</body>

</html>
