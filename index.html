<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petani Indonesia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #9cdb71;
        }

        header {
            background-color: #5c9653;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            width: 100%;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-wrap img {
            width: 55px;
            height: 55px;
            background-color: white;
            border-radius: 50%;
            object-fit: cover;
        }

        .logo-wrap span {
            font-size: 22px;
            font-weight: bold;
            color: #111;
        }

        .header-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .top-menu {
            display: flex;
            gap: 20px;
        }

        .top-menu a {
            color: white;
            text-decoration: none;
            font-size: 13px;
        }

        .search-bar {
            display: flex;
        }

        .search-bar input {
            padding: 6px 12px;
            border: none;
            width: 220px;
            outline: none;
        }

        .search-bar button {
            padding: 6px 15px;
            background-color: #6bb05f;
            border: none;
            color: white;
            cursor: pointer;
        }

        nav {
            background-color: white;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 18px 0;
        }

        nav a {
            text-decoration: none;
            color: #5c2929;
            font-weight: bold;
            font-size: 16px;
        }

        .main-wrapper {
            display: grid;
            grid-template-columns: 2fr 6.5fr 2fr;
            gap: 25px;
            padding: 25px 40px;
            width: 100%;
            flex-grow: 1;
        }

        .col-left, .col-right {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-menu {
            background-color: #5574b8;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 4px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }

        .img-small {
            margin-top: auto;
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 4px;
        }

        .email-form {
            display: flex;
            gap: 8px;
        }

        .email-form input {
            flex-grow: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            outline: none;
            width: 100%;
        }

        .email-form button {
            padding: 10px 15px;
            background-color: #5574b8;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .col-center {
            width: 100%;
            height: 100%;
        }

        .col-center img {
            width: 100%;
            height: 100%;
            min-height: 500px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-wrap">
            <img src="logo.png" alt="">
            <span>Petani Indonesia</span>
        </div>
        <div class="header-actions">
            <div class="top-menu">
                <a href="#">Product</a>
                <a href="#">Galleries</a>
                <a href="#">Contact Us</a>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search">
                <button>Search</button>
            </div>
        </div>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About US</a>
    </nav>

    <div class="main-wrapper">
        <div class="col-left">
            <button class="btn-menu">Feature 1</button>
            <button class="btn-menu">Feature 2</button>
            <button class="btn-menu">Feature 3</button>
            <button class="btn-menu">Feature 4</button>
            <button class="btn-menu">Feature 5</button>
            
            <img class="img-small" src="image2.jpg" alt="">

            <div class="email-form">
                <input type="email" placeholder="Email Address">
                <button type="button">Submit</button>
            </div>
        </div>

        <div class="col-center">
            <img src="image1.jpg" alt="">
        </div>

        <div class="col-right">
            <button class="btn-menu">Session 1</button>
            <button class="btn-menu">Session 2</button>
            <button class="btn-menu">Session 3</button>
            <button class="btn-menu">Session 4</button>
            <button class="btn-menu">Session 5</button>
            <button class="btn-menu">Session 6</button>
            <button class="btn-menu">Session 7</button>
        </div>
    </div>

</body>
</html>
